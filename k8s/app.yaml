apiVersion: apps/v1
kind: Deployment
metadata:
  name: docs-app
spec:
  replicas: 1
  selector:
    matchLabels: { app: docs-app }
  template:
    metadata:
      labels: { app: docs-app }
    spec:
      initContainers:
        - name: wait-db
          image: busybox:1.36
          command: ['sh', '-c', 'until nc -z db 5432; do echo cho db...; sleep 2; done']
      containers:
        - name: app
          image: docs-app:1.0
          imagePullPolicy: IfNotPresent
          env:
            - name: DATABASE_URL
              valueFrom:
                secretKeyRef: { name: docs-db, key: DATABASE_URL }
          ports:
            - containerPort: 3000
          readinessProbe:
            httpGet: { path: /, port: 3000 }
            initialDelaySeconds: 5
            periodSeconds: 10
---
apiVersion: v1
kind: Service
metadata:
  name: docs-app
spec:
  type: NodePort
  selector: { app: docs-app }
  ports:
    - port: 3000
      targetPort: 3000
