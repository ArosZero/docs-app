name: CI - Build & Push

on:
  push:
    branches: [main]
    paths-ignore:
      - 'k8s/**'          # commit chỉ sửa manifest thì khỏi build lại

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: write     # cho phép job cập nhật tag commit ngược lại (Giai đoạn 5)
    steps:
      - uses: actions/checkout@v4
      - uses: docker/setup-buildx-action@v3
      - uses: docker/login-action@v3
        with:
          username: ${{ secrets.REGISTRY_USER }}
          password: ${{ secrets.REGISTRY_TOKEN }}
      - uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          tags: |
            ${{ secrets.REGISTRY_USER }}/docs-app:${{ github.sha }}
            ${{ secrets.REGISTRY_USER }}/docs-app:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max
      - name: Cap nhat tag image trong manifest
        run: |
          sed -i "s|image: .*/docs-app:.*|image: docker.io/${{ secrets.REGISTRY_USER }}/docs-app:${{ github.sha }}|" k8s/app.yaml
          git config user.name "ci-bot"
          git config user.email "ci@example.com"
          git add k8s/app.yaml
          git commit -m "deploy ${{ github.sha }} [skip ci]" || echo "khong doi"
          git push
